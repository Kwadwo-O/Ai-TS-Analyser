<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TypeSwift{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block styles %}{% endblock %}
</head>
<script>
    // Executed immediately before standard DOM layouts process
    if (localStorage.getItem("app-ui-theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
    }
</script>
<body>
    <nav class="navbar animate-nav">
        <a href="/" class="nav-logo">
            <svg class="nav-logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.25rem;">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                <line x1="6" y1="8" x2="6" y2="8"></line>
                <line x1="10" y1="8" x2="10" y2="8"></line>
                <line x1="14" y1="8" x2="14" y2="8"></line>
                <line x1="18" y1="8" x2="18" y2="8"></line>
                <line x1="6" y1="12" x2="6" y2="12"></line>
                <line x1="18" y1="12" x2="18" y2="12"></line>
                <line x1="7" y1="16" x2="17" y2="16"></line>
            </svg>
            TypeSwift
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/play" class="nav-link">Play</a>

            {% if current_user.is_authenticated %}
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
            {% else %}
                <a href="/login" class="nav-link">Login</a>
                <a href="/register" class="nav-link">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-wrapper">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
