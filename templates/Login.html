{% extends "Base.html" %}
{% block content %}
<div class="login-container">
    <div class="main-card">
        <h1 class="title">Welcome <span class="title-highlight">Back</span></h1>
        <p class="description">Please enter your details to sign in and track your typing speed.</p>

        <form action="{{ url_for('login') }}" method="POST" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-play">Sign In</button>
        </form>

        <p class="form-footer">
            Don't have an account? <a href="/register" class="form-link">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
