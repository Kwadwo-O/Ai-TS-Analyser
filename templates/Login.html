{% extends "Base.html" %}

{% block content %}
    <h1>AI Typing Speed Analyser - Login</h1>
    <p>Welcome to the AI Typing Speed Analyser! This application allows you to test your typing speed and accuracy.</p>
    <h1>Login</h1>
    <form method="POST">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Log In</button>
    </form>
    <p>No account? <a href="/register">Register</a></p>
{% endblock %}
