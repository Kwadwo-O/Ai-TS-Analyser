{% extends "Base.html" %}
{% block content %}
<div class="login-container">
    <div class="main-card">
        <h1 class="title">Create <span class="title-highlight">Account</span></h1>
        <p class="description">Sign up today to start testing your speed and tracking your typing growth.</p>

        <form action="{{ url_for('register') }}" method="POST" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Choose a password">
            </div>

            <button type="submit" class="btn btn-play">Create Account</button>
        </form>

        <p class="form-footer">
            Already have an account? <a href="/login" class="form-link">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
