{% extends "Base.html" %}

{% block content %}
    <h1>AI Typing Speed Analyser - Register</h1>
    <p>Welcome to the AI Typing Speed Analyser! This application allows you to test your typing speed and accuracy.</p>
    <form method="POST">
    <input type="text" name="username" placeholder="Choose a username" required><br><br>
    <input type="password" name="password" placeholder="Choose a password" required><br><br>
    <button type="submit">Create Account</button>
  </form>
  <p>Already have an account? <a href="/login">Login</a></p>/p>
{% endblock %}
